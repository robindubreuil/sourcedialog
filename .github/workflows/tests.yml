name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        bash-version:
          - "4.3"
          - "4.4"
          - "5.0"
          - "5.1"
          - "5.2"
    steps:
      - uses: actions/checkout@v4
      - name: Install Bash ${{ matrix.bash-version }}
        run: |
          sudo apt-get update
          sudo apt-get install -y automake gcc make
          curl -L https://ftp.gnu.org/gnu/bash/bash-${{ matrix.bash-version }}.tar.gz | tar xz
          cd bash-${{ matrix.bash-version }}
          ./configure --prefix=/usr/local
          make -j$(nproc)
          sudo make install
          cd ..
          rm -rf bash-${{ matrix.bash-version }}
      - name: Verify Bash version
        run: /usr/local/bin/bash --version
      - name: Run tests
        run: /usr/local/bin/bash tests/run.sh

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -s bash sourcedialog

  lint-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck on examples
        run: shellcheck -s bash --exclude=SC1091,SC2034,SC2154 examples/* tutorial/*
